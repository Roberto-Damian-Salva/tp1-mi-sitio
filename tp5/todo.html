<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Lista de Tareas - 5to Año</title>
    <link rel="stylesheet" href="todocss.css"> </head>
<body>
    <div class="container">
        <h1>Mis Pendientes</h1>
        
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Ej: Estudiar para Programación">
            <button type="submit" id="add-btn">Agregar</button>
        </form>

        <ul id="todo-list"></ul>

        <p class="counter">Tareas pendientes: <span id="pendientes-count">0</span></p>
    </div>

    <script src="todo.js"></script>
</body>
</html>
