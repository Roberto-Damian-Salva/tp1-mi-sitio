<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Proyecto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Contacto</h1>
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Campo_necesario">
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo_@correo.com">
                </div>

                <div class="form-group">
                    <label for="tel">Teléfono:</label>
                    <input type="tel" id="tel" name="tel" pattern="[0-9]+" placeholder="Solo_numeros_+387">
                </div>

                <div class="form-group">
                    <label for="motivo">Motivo de contacto:</label>
                    <select id="motivo" name="motivo">
                        <option value="">-- Selecciona una opción --</option>
                        <option value="consulta">Consulta general</option>
                        <option value="Propuesta">Propuesta</option>
                        <option value="reclamo">reclamo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" required minlength="10" placeholder="Escribe aquí tu mensaje..."></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <label for="terminos">Acepto los términos y condiciones</label>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>

</body>
</html>
